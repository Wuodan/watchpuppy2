name: Filesystem Proof Self-Hosted Windows

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-host-bind-mount:
    runs-on:
      - self-hosted
      - windows
      - filesystem-proof
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Pending implementation
        shell: pwsh
        run: |
          Write-Error "windows-host-bind-mount proof is not implemented yet"

      - name: Publish proof summary
        shell: pwsh
        run: |
          @"
          # Filesystem Proof Result

          | Scenario | Result |
          | --- | --- |
          | windows-host-bind-mount | pending |
          "@ >> $env:GITHUB_STEP_SUMMARY
