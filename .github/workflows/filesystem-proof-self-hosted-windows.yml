name: Filesystem Proof Self-Hosted Windows

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-host-bind-mount:
    runs-on:
      - self-hosted
      - windows
      - filesystem-proof
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Pending implementation
        shell: pwsh
        run: |
          Write-Error "windows-host-bind-mount proof is not implemented yet"

      - name: Publish proof summary
        shell: pwsh
        run: |
          @"
          # Filesystem Proof Result

          | Scenario | Result |
          | --- | --- |
          | windows-host-bind-mount | pending |
          "@ >> $env:GITHUB_STEP_SUMMARY
