name: Filesystem Proof Self-Hosted

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-cifs-share:
    runs-on:
      - self-hosted
      - linux
      - filesystem-proof
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Run Linux CIFS proof
        run: |
          ./scripts/run-proof-scenario.sh linux-cifs-share artifacts

      - name: Upload proof artifacts
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874  # v4.4.0
        with:
          name: filesystem-proof-linux-cifs
          path: artifacts/

  windows-host-bind-mount:
    runs-on:
      - self-hosted
      - windows
      - filesystem-proof
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Pending implementation
        shell: pwsh
        run: |
          Write-Error "windows-host-bind-mount proof is not implemented yet"
